name: release-please

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    runs-on: ubuntu-latest

    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-assets:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            runs-on: windows-latest
            archive_name: ocswitch-desktop-windows-amd64.zip
            raw_name: ocswitch-desktop-windows-amd64.exe
            output: build/bin/ocswitch-desktop.exe
          - name: linux
            runs-on: ubuntu-22.04
            archive_name: ocswitch-desktop-linux-amd64.zip
            raw_name: ''
            output: build/bin/ocswitch-desktop

    runs-on: ${{ matrix.runs-on }}

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev build-essential pkg-config

      - name: Build desktop app
        run: wails build -tags desktop_wails

      - name: Package release files
        shell: bash
        env:
          SOURCE_PATH: ${{ matrix.output }}
          ARCHIVE_NAME: ${{ matrix.archive_name }}
          RAW_NAME: ${{ matrix.raw_name }}
        run: |
          mkdir -p release
          python - <<'PY'
          import hashlib
          import os
          import pathlib
          import shutil
          import zipfile

          def write_sha256(path: pathlib.Path) -> None:
              digest = hashlib.sha256(path.read_bytes()).hexdigest()
              path.with_suffix(path.suffix + ".sha256").write_text(f"{digest}  {path.name}\n", encoding="ascii")

          source = pathlib.Path(os.environ["SOURCE_PATH"])
          archive = pathlib.Path("release") / os.environ["ARCHIVE_NAME"]
          archive.parent.mkdir(parents=True, exist_ok=True)

          with zipfile.ZipFile(archive, "w", compression=zipfile.ZIP_DEFLATED) as zf:
              if source.is_dir():
                  for path in source.rglob("*"):
                      if path.is_file():
                          zf.write(path, arcname=f"{source.name}/{path.relative_to(source).as_posix()}")
              else:
                  zf.write(source, arcname=source.name)
          write_sha256(archive)

          raw_name = os.environ["RAW_NAME"].strip()
          if raw_name:
              raw_path = pathlib.Path("release") / raw_name
              shutil.copy2(source, raw_path)
              write_sha256(raw_path)
          PY

      - name: List packaged files
        shell: bash
        run: |
          python - <<'PY'
          import pathlib

          for path in sorted(pathlib.Path("release").glob("**/*")):
              if path.is_file():
                  print(path.as_posix())
          PY

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-release-assets
          path: release/**

  publish-release:
    needs:
      - release-please
      - build-assets
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Compose bilingual release notes
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          gh release view "$TAG_NAME" --json body --jq '.body' > release-notes.en.md
          python - <<'PY'
          import os
          import pathlib
          import sys

          tag = os.environ["TAG_NAME"]
          zh_path = pathlib.Path(f".github/release-notes/{tag}.zh-CN.md")
          en_path = pathlib.Path("release-notes.en.md")
          out_path = pathlib.Path("release-notes.combined.md")

          if not zh_path.exists():
              print(f"missing Chinese release notes: {zh_path.as_posix()}", file=sys.stderr)
              sys.exit(1)

          zh_body = zh_path.read_text(encoding="utf-8").strip()
          en_body = en_path.read_text(encoding="utf-8").strip()
          out_path.write_text(
              "\n".join([
                  "## 更新日志（中文）",
                  "",
                  zh_body,
                  "",
                  "## Changelog (English)",
                  "",
                  en_body,
                  "",
              ]),
              encoding="utf-8",
          )
          PY

      - name: Update GitHub Release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: gh release edit "$TAG_NAME" --notes-file release-notes.combined.md

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import subprocess
          import sys

          files = sorted(str(path) for path in pathlib.Path("release-assets").rglob("*") if path.is_file())
          if not files:
              print("no release assets found", file=sys.stderr)
              sys.exit(1)

          subprocess.run(["gh", "release", "upload", os.environ["TAG_NAME"], *files, "--clobber"], check=True)
          PY
